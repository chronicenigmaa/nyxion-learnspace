name: Nyxion LearnSpace CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        working-directory: ./backend
        run: pip install -r requirements.txt
      - name: Syntax check
        working-directory: ./backend
        run: |
          python -m py_compile app/main.py
          python -m py_compile app/models/models.py
          python -m py_compile app/api/v1/endpoints/auth.py
          python -m py_compile app/api/v1/endpoints/assignments.py
          python -m py_compile app/api/v1/endpoints/submissions.py
          python -m py_compile app/api/v1/endpoints/exams.py
          echo "✅ Backend OK"

  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: ./frontend
        run: npm install
      - name: Build
        working-directory: ./frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://placeholder.up.railway.app
